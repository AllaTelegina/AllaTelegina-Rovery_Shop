    Layout = "_AdminLayout";
    ViewData["Title"] = "Отзывы";
}

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminPanel — Отзывы</title>
   <link href="output.css" rel="stylesheet">
      <script src="https://cdn.tailwindcss.com"></script>

      <!-- Alpine.js (defer - скрипт ждёт загрузки DOM) -->
      <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

      <!-- Flowbite JS (версия 2.3.0) -->
      <script defer src="https://unpkg.com/flowbite@2.3.0/dist/flowbite.min.js"></script>

      <!-- основной JS -->

      <script type="module" defer src="/dist/main.js"></script>
</head>

<body class="bg-gray-100 flex">

  <!-- Боковое меню -->
  <aside class="w-64 bg-gray-900 text-white flex flex-col min-h-screen">
    <div class="p-4 text-2xl font-bold border-b border-teal-600">AdminPanel</div>
    <nav class="flex-1 mt-4">
      <ul>
        <li><a href="/Admin/Dashboard" class="block p-3 hover:bg-teal-600">📊 Dashboard</a></li>
        <li><a href="/Admin/Products" class="block p-3 bg-teal-600">🛍️ Товары</a></li>
        <li><a href="/Admin/Orders" class="block p-3 hover:bg-teal-600">📦 Заказы</a></li>
        <li><a href="/Admin/Blog" class="block p-3 hover:bg-teal-600">📝 Блог</a></li>
        <li><a href="/Admin/Comments" class="block p-3 hover:bg-teal-600">💬 Комментарии</a></li>
        <li><a href="/Admin/Reviews" class="block p-3 hover:bg-teal-600">⭐ Отзывы</a></li>
        <li><a href="/Admin/Feedback" class="block p-3 hover:bg-teal-600">✉️ Feedback</a></li>
        <li><a href="/Admin/Users" class="block p-3 hover:bg-teal-600">👥 Пользователи</a></li>
        <li><a href="/Admin/Reports" class="block p-3 hover:bg-teal-600">📈 Отчёты</a></li>
      </ul>
    </nav>
    <div class="p-4 border-t border-teal-600">
      <a href="/Account/Logout" class="block text-sm text-gray-300 hover:text-red-600">🚪 Выйти</a>
    </div>
  </aside>

<main class="flex-1 p-8 bg-gray-100 min-h-screen" x-data="reviewsAdmin()">

  <!-- Заголовок -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-gray-800">⭐ Управление отзывами</h1>
    <button @click="openModal"
            class="bg-teal-600 text-white px-5 py-2 rounded-lg hover:bg-teal-500 transition">
     <span>＋</span> Добавить отзыв
    </button>
  </div>

  <!-- Поиск -->
  <div class="flex items-center mb-6">
    <input type="text" placeholder="🔍 Поиск по имени или email..."
           x-model="searchQuery"
           class="w-full md:w-1/3 border border-gray-300 rounded-lg px-4 py-2 focus:border-teal-500 focus:ring focus:ring-teal-200 outline-none">
  </div>

  <!-- Таблица отзывов -->
  <div class="overflow-x-auto bg-white rounded-lg shadow-md">
    <table class="min-w-full text-sm text-left">
      <thead class="bg-gray-200 text-gray-700 uppercase text-xs">
        <tr>
          <th class="px-4 py-3 cursor-pointer" @click="sort('id')">ID</th>
          <th class="px-4 py-3 cursor-pointer" @click="sort('name')">Имя</th>
          <th class="px-4 py-3">Email</th>
          <th class="px-4 py-3">Статус пользователя</th>
          <th class="px-4 py-3">Рейтинг</th>
          <th class="px-4 py-3">Отзыв</th>
          <th class="px-4 py-3 cursor-pointer" @click="sort('status')">Статус</th>
          <th class="px-4 py-3 text-right">Действия</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <template x-for="review in filteredReviews" :key="review.id">
          <tr>
            <td class="px-4 py-3 text-gray-500" x-text="review.id"></td>
            <td class="px-4 py-3 font-medium text-gray-800" x-text="review.name"></td>
            <td class="px-4 py-3 text-gray-600" x-text="review.email"></td>
            <td class="px-4 py-3" x-text="review.is_guest ? 'Гость' : 'Зарегистрирован'"></td>
            <td class="px-4 py-3 text-yellow-500" x-html="getStars(review.rating)"></td>
            <td class="px-4 py-3 text-gray-700" x-text="review.content"></td>
            <td class="px-4 py-3">
              <span :class="{
                  'text-orange-600 font-semibold': review.status === 'На проверке',
                  'text-green-600 font-semibold': review.status === 'Опубликован',
                  'text-red-600 font-semibold': review.status === 'Отклонён'
                }"
                x-text="review.status"></span>
            </td>
            <td class="px-4 py-3 text-right space-x-2">
              <button @click="editReview(review)" class="text-blue-600 hover:text-blue-800">✏️</button>
              <button @click="deleteReview(review.id)" class="text-red-600 hover:text-red-800">🗑️</button>
              <button @click="toggleStatus(review.id)" class="text-green-600 hover:text-green-800">✅</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Пагинация -->
  <div class="flex justify-between items-center mt-6 text-sm text-gray-600">
    <p x-text="`Показано ${paginatedReviews.length} из ${reviews.length} отзывов`"></p>
    <div class="flex items-center space-x-2">
      <button @click="prevPage" class="px-3 py-1 border rounded-lg hover:bg-gray-200 transition">«</button>
      <template x-for="page in totalPages" :key="page">
        <button @click="currentPage = page"
                :class="{'bg-teal-600 text-white': currentPage === page, 'border px-3 py-1 rounded-lg hover:bg-gray-200 transition': true}"
                x-text="page"></button>
      </template>
      <button @click="nextPage" class="px-3 py-1 border rounded-lg hover:bg-gray-200 transition">»</button>
    </div>
  </div>

  <!-- Модальное окно -->
  <div x-show="showModal" x-transition
       class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
       @click.self="closeModal">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-2xl p-6 overflow-y-auto max-h-[90vh]">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6"
          x-text="editId ? 'Редактировать отзыв' : 'Добавить отзыв'"></h2>

      <form class="space-y-4" @submit.prevent="saveReview">

        <!-- Имя -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Имя</label>
          <input type="text" x-model="form.name"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-teal-500 focus:ring focus:ring-teal-200 outline-none">
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Email</label>
          <input type="email" x-model="form.email"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-teal-500 focus:ring focus:ring-teal-200 outline-none">
        </div>

        <!-- Статус пользователя -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Пользователь</label>
          <select x-model="form.is_guest"
                  class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-teal-500 focus:ring focus:ring-teal-200 outline-none">
            <option :value="true">Гость</option>
            <option :value="false">Зарегистрирован</option>
          </select>
        </div>

        <!-- Рейтинг -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Рейтинг (1–5)</label>
          <input type="number" min="1" max="5" x-model="form.rating"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-teal-500 focus:ring focus:ring-teal-200 outline-none">
        </div>

        <!-- Текст -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Текст отзыва</label>
          <textarea rows="4" x-model="form.content"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 resize-none focus:border-teal-500 focus:ring focus:ring-teal-200 outline-none"></textarea>
        </div>

        <!-- Статус -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Статус</label>
          <select x-model="form.status"
                  class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-teal-500 focus:ring focus:ring-teal-200 outline-none">
            <option>На проверке</option>
            <option>Опубликован</option>
            <option>Отклонён</option>
          </select>
        </div>

        <!-- Кнопки -->
        <div class="flex justify-end gap-4 pt-4 border-t border-gray-200 mt-6">
          <button type="button" @click="closeModal"
                  class="px-5 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition">
            Отмена
          </button>
          <button type="submit"
                  class="px-5 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-500 transition">
            💾 Сохранить
          </button>
        </div>

      </form>
    </div>
  </div>
</main>

<script>
function reviewsAdmin() {
  return {
    reviews: [
      { id: 1, name: 'Иван', email: 'ivan@mail.ru', is_guest: false, rating: 5, content: 'Отличный сервис!', status: 'Опубликован' },
      { id: 2, name: 'Ольга', email: 'olga@example.com', is_guest: true, rating: 4, content: 'Все понравилось!', status: 'На проверке' },
      { id: 3, name: 'Алексей', email: 'alex@mail.ru', is_guest: true, rating: 3, content: 'Доставка задержалась.', status: 'Отклонён' },
    ],
    form: { name: '', email: '', is_guest: true, rating: 5, content: '', status: 'На проверке' },
    showModal: false,
    editId: null,
    searchQuery: '',
    sortField: 'id',
    sortAsc: true,
    currentPage: 1,
    perPage: 5,

    get filteredReviews() {
      const search = this.searchQuery.toLowerCase();
      return this.paginatedReviews.filter(r =>
        r.name.toLowerCase().includes(search) ||
        r.email.toLowerCase().includes(search)
      );
    },

    get sortedReviews() {
      return [...this.reviews].sort((a, b) => {
        const fa = a[this.sortField];
        const fb = b[this.sortField];
        if (fa < fb) return this.sortAsc ? -1 : 1;
        if (fa > fb) return this.sortAsc ? 1 : -1;
        return 0;
      });
    },

    get paginatedReviews() {
      const start = (this.currentPage - 1) * this.perPage;
      return this.sortedReviews.slice(start, start + this.perPage);
    },

    get totalPages() {
      return Math.ceil(this.reviews.length / this.perPage);
    },

    sort(field) {
      if (this.sortField === field) this.sortAsc = !this.sortAsc;
      else this.sortField = field;
    },

    openModal() {
      this.showModal = true;
      this.editId = null;
      this.form = { name: '', email: '', is_guest: true, rating: 5, content: '', status: 'На проверке' };
    },

    closeModal() {
      this.showModal = false;
    },

    saveReview() {
      if (this.editId) {
        const index = this.reviews.findIndex(r => r.id === this.editId);
        this.reviews[index] = { ...this.form, id: this.editId };
      } else {
        const newId = this.reviews.length ? Math.max(...this.reviews.map(r => r.id)) + 1 : 1;
        this.reviews.push({ ...this.form, id: newId });
      }
      this.closeModal();
    },

    editReview(review) {
      this.editId = review.id;
      this.form = JSON.parse(JSON.stringify(review));
      this.showModal = true;
    },

    deleteReview(id) {
      this.reviews = this.reviews.filter(r => r.id !== id);
    },

    toggleStatus(id) {
      const r = this.reviews.find(r => r.id === id);
      if (!r) return;
      r.status = r.status === 'Опубликован' ? 'На проверке' : 'Опубликован';
    },

    getStars(rating) {
      return '★'.repeat(rating) + '☆'.repeat(5 - rating);
    },

    prevPage() {
      if (this.currentPage > 1) this.currentPage--;
    },

    nextPage() {
      if (this.currentPage < this.totalPages) this.currentPage++;
    }
  };
}
</script>

</body>
</html>
