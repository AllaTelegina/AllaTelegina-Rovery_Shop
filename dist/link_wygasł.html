<html lang="pl" class="h-full">
<head>
      <meta charset="UTF-8">
      <title>link_wygasł</title>
      <link href="output.css" rel="stylesheet">
      <script src="https://cdn.tailwindcss.com"></script>

      <!-- Alpine.js (defer - скрипт ждёт загрузки DOM) -->
      <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

      <!-- Flowbite JS (версия 2.3.0) -->
      <script defer src="https://unpkg.com/flowbite@2.3.0/dist/flowbite.min.js"></script>

      <!-- основной JS -->
      <script type="module" defer src="./main.js"></script>
</head>

<body class="flex flex-col min-h-screen">

<main class="flex-grow container mx-auto mt-20">

      <div class="mb-6 flex flex-col gap-4 sm:mb-8 md:mb-12">
            <div class="bg-white dark:bg-gray-800 sm:py-8 lg:py-4 container px-2 py-1 ">
                  <div class="max-w-screen-3xl px-2 py-4 md:px-8 mx-auto">


                        <div class="mb-6 flex flex-col sm:flex-row items-start sm:items-center justify-between sm:gap-2 sm:mb-8 md:mb-12">
                              <h1 class="text-2xl font-bold text-teal-800 lg:text-3xl dark:text-white">Czas przeznaczony na odzyskanie hasła upłynął.</h1>
                              <!-- Хлебные крошки -->
                              <nav class="flex" aria-label="Breadcrumb">
                                    <ol class="inline-flex items-center space-x-1 md:space-x-2 rtl:space-x-reverse">
                                          <li class="inline-flex items-center">
                                                <a href="#"
                                                   class="inline-flex items-center text-sm font-medium text-teal-700 hover:text-red-700 dark:text-gray-400 dark:hover:text-white">
                                                      <svg class="w-3 h-3 me-2.5" aria-hidden="true" fill="currentColor"
                                                           viewBox="0 0 20 20">
                                                            <path d="m19.707 9.293-2-2-7-7a1 1 0 0 0-1.414 0l-7 7-2 2a1 1 0 0 0 1.414 1.414L2 10.414V18a2 2 0 0 0 2 2h3a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h3a2 2 0 0 0 2-2v-7.586l.293.293a1 1 0 0 0 1.414-1.414Z"/>
                                                      </svg>
                                                      Dom
                                                </a>
                                          </li>
                                          <li aria-current="page">
                                                <div class="flex items-center">
                                                      <svg class="rtl:rotate-180 w-3 h-3 text-gray-400 mx-1" fill="none"
                                                           viewBox="0 0 6 10">
                                                            <path stroke="currentColor" stroke-linecap="round"
                                                                  stroke-linejoin="round" stroke-width="2"
                                                                  d="m1 9 4-4-4-4"/>
                                                      </svg>
                                                      <span class="ms-1 text-sm font-medium text-gray-500 md:ms-2 dark:text-gray-400">link wygasł</span>
                                                </div>
                                          </li>
                                    </ol>
                              </nav>
                        </div>

                        <div class="max-w-7xl mx-auto">

                             

                              <!-- Регистрация -->
                              <div
                                    @click="mode = 'register'"
                                    x-show="mode === 'register' || window.innerWidth >= 640"
                                    x-cloak
                                    :class="mode === 'register' ? 'ring-2 ring-teal-200' : ''"
                                    class="bg-white dark:bg-gray-800 p-6 sm:p-4 rounded-lg shadow transition-all
         w-full max-w-md md:max-w-md lg:max-w-lg mx-auto flex flex-col justify-center">
                                    <h2 class="text-xl font-bold mb-4 text-center">Wyślij ponownie, aby odzyskać hasło</h2>
                                    <form class="space-y-4" action="#">
                                         
                                          <button type="submit"
                                                  class="w-full uppercase text-white bg-teal-400 hover:bg-red-600 focus:ring-4 focus:outline-none focus:ring-teal-500 font-medium rounded-lg text-sm px-5 py-3.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
                                                wejście
                                          </button>
                                    </form>
                              </div>

                        </div>

                  </div>
            </div>
      </div>
</main>
